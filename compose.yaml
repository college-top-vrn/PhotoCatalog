services:
  backend:
    image: photocatalog-backend:${APP_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: photocatalog-api
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - photocatalog-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  proxy:
    image: nginx:alpine
    container_name: photocatalog-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - photocatalog-network

networks:
  photocatalog-network:
    driver: bridge