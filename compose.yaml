services:
  backend:
    image: photocatalog-backend:${APP_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: photocatalog-api
    ports:
      - "${EXTERNAL_PORT:-5000}:8080"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - photocatalog-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s 
      
      
networks:
  photocatalog-network:
    driver: bridge